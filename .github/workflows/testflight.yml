name: TestFlight Deploy

# ────────────────────────────────────────────────────────────────────
# Builds WreckerLogix for iOS and uploads to TestFlight.
#
# PREREQUISITES (one-time setup):
# 1. Apple Developer Account ($99/yr — already paid ✅)
# 2. Create an App ID in App Store Connect: com.wreckerlogix.app
# 3. Create a provisioning profile for that App ID
# 4. Add these GitHub Secrets (Settings → Secrets → Actions):
#    - APPLE_TEAM_ID                : Your 10-char Apple Developer Team ID
#    - APPLE_CERTIFICATES_P12       : Base64-encoded .p12 distribution cert
#    - APPLE_CERTIFICATES_PASSWORD  : Password for the .p12 cert
#    - APPLE_PROVISIONING_PROFILE   : Base64-encoded .mobileprovision file
#    - APP_STORE_CONNECT_API_KEY    : App Store Connect API key (.p8 contents)
#    - APP_STORE_CONNECT_ISSUER_ID  : Issuer ID from App Store Connect
#    - APP_STORE_CONNECT_KEY_ID     : Key ID from App Store Connect
#
# APPLE_TEAM_ID: Go to developer.apple.com → Account → Membership details
#   Copy the 10-character Team ID (e.g. ABCD123456)
#
# HOW TO GET THESE:
#
# Option A — No Mac required (recommended):
#   Run the "Generate iOS Signing Certificate" workflow (generate-certificate.yml)
#   It runs on macOS CI and walks you through a 2-phase process:
#   Phase 1: generates a CSR → you upload to developer.apple.com
#   Phase 2: packages the .p12 → you copy to GitHub Secrets
#
# Option B — From a Mac:
#   1. Go to developer.apple.com → Certificates, IDs & Profiles
#   2. Create a Distribution Certificate → export as .p12
#   3. Run: base64 -i certificate.p12 | pbcopy → paste as APPLE_CERTIFICATES_P12
#
# App Store Connect API Key (both options):
#   1. Go to App Store Connect → Users & Access → Integrations → Keys
#   2. Generate API Key (Admin role) → download the .p8 file
#   3. Note the Key ID and Issuer ID shown on the page
# ────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-upload:
    name: Build iOS & Upload to TestFlight
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate platform folders
        run: flutter create . --project-name wreckerlogix --org com.wreckerlogix

      - name: Patch Podfile for iOS 13 minimum deployment target
        shell: bash
        run: |
          sed -i '' "s/# platform :ios, '9.0'/platform :ios, '13.0'/g" ios/Podfile || true
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '13.0'/g" ios/Podfile || true
          echo "Podfile patched to iOS 13.0"

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cp ci/ExportOptions.plist ios/ExportOptions.plist
          if [ -n "$APPLE_TEAM_ID" ]; then
            sed -i '' "s/TEAM_ID_PLACEHOLDER/$APPLE_TEAM_ID/g" ios/ExportOptions.plist
            echo "✅ ExportOptions.plist patched with Team ID: $APPLE_TEAM_ID"
          else
            echo "⚠️  APPLE_TEAM_ID not set — ExportOptions.plist uses placeholder (build will use no-codesign fallback)"
          fi

      - name: Install Apple Certificate
        if: env.APPLE_CERTIFICATES_P12 != ''
        env:
          APPLE_CERTIFICATES_P12: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          APPLE_CERTIFICATES_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$APPLE_CERTIFICATES_P12" | base64 --decode > $CERT_PATH
          security import $CERT_PATH -P "$APPLE_CERTIFICATES_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$APPLE_PROVISIONING_PROFILE" | base64 --decode > $PROFILE_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_TEAM_ID" ] && [ -f ios/ExportOptions.plist ]; then
            flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          else
            echo "⚠️  Signing secrets not configured — building without code signing"
            flutter build ios --release --no-codesign
          fi

      - name: Upload to TestFlight
        if: env.APP_STORE_CONNECT_KEY_ID != ''
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          # altool expects the .p8 key at the standard path:
          # ~/.appstoreconnect/private_keys/AuthKey_<KEY_ID>.p8
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            || echo "⚠️ TestFlight upload requires signing secrets. See workflow comments for setup."

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "## 🚛 WreckerLogix iOS Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Getting this on your iPhone:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option A — Web App (instant, no setup):**" >> $GITHUB_STEP_SUMMARY
          echo "1. Open Safari on your iPhone" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to https://mward5710-byte.github.io/Wreckerlogix/" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap Share → Add to Home Screen" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Option B — TestFlight (native app):**" >> $GITHUB_STEP_SUMMARY
          echo "Add these 7 GitHub Secrets (Settings → Secrets → Actions), then push a tag:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Where to get it |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`APPLE_TEAM_ID\` | developer.apple.com → Account → Membership |" >> $GITHUB_STEP_SUMMARY
          echo "| \`APPLE_CERTIFICATES_P12\` | generate-certificate.yml Phase 2 summary |" >> $GITHUB_STEP_SUMMARY
          echo "| \`APPLE_CERTIFICATES_PASSWORD\` | generate-certificate.yml Phase 2 summary |" >> $GITHUB_STEP_SUMMARY
          echo "| \`APPLE_PROVISIONING_PROFILE\` | developer.apple.com → Profiles → base64 |" >> $GITHUB_STEP_SUMMARY
          echo "| \`APP_STORE_CONNECT_KEY_ID\` | App Store Connect → Keys |" >> $GITHUB_STEP_SUMMARY
          echo "| \`APP_STORE_CONNECT_ISSUER_ID\` | App Store Connect → Keys |" >> $GITHUB_STEP_SUMMARY
          echo "| \`APP_STORE_CONNECT_API_KEY\` | .p8 file contents from App Store Connect |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "git tag v1.0.0 && git push origin v1.0.0" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
