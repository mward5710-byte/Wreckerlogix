name: Generate iOS Signing Certificate

# ────────────────────────────────────────────────────────────────────
# Workflow to generate an iOS distribution certificate WITHOUT needing
# a local Mac. Runs on macOS CI runner.
#
# THREE MODES:
#
# ── automated (recommended) ─────────────────────────────────────────
#   Requires: APP_STORE_CONNECT_API_KEY, APP_STORE_CONNECT_KEY_ID,
#             APP_STORE_CONNECT_ISSUER_ID already in repo secrets.
#   1. Go to Actions → "Generate iOS Signing Certificate" → Run workflow
#   2. Set mode to "automated"
#   3. Wait for the run to complete
#   4. Copy APPLE_CERTIFICATES_P12 and APPLE_CERTIFICATES_PASSWORD
#      from the workflow summary and add them as GitHub Secrets
#
# ── generate-csr (Phase 1 of manual flow) ───────────────────────────
#   1. Run workflow with mode "generate-csr"
#   2. Download the "signing-csr" artifact
#   3. Go to developer.apple.com → Certificates → "+" → Apple Distribution
#   4. Upload CertificateSigningRequest.certSigningRequest from the artifact
#   5. Download the resulting .cer file from Apple
#   6. Base64-encode it and add as GitHub Secret: APPLE_CERTIFICATE_CER
#   7. Run this workflow again with mode "package-p12"
#
# ── package-p12 (Phase 2 of manual flow) ────────────────────────────
#   Requires: APPLE_CERTIFICATE_CER secret set from Phase 1
#   1. Run workflow with mode "package-p12"
#   2. Copy APPLE_CERTIFICATES_P12 and APPLE_CERTIFICATES_PASSWORD
#      from the workflow summary and add them as GitHub Secrets
#
# ⚠️  SECURITY: The private key never leaves GitHub's macOS runner.
#     Artifacts are encrypted at rest and expire after 1 day.
# ────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode to run'
        required: true
        type: choice
        options:
          - automated
          - generate-csr
          - package-p12
      email:
        description: 'Email for CSR'
        required: false
        default: 'admin@wreckerlogix.com'
        type: string
      common_name:
        description: 'Common name for CSR'
        required: false
        default: 'WreckerLogix Distribution'
        type: string

permissions:
  contents: read

jobs:
  # ── AUTOMATED MODE ────────────────────────────────────────────────
  # Generates CSR, calls App Store Connect API, packages .p12 — all in one step.
  automated:
    name: Automated Certificate Creation (App Store Connect API)
    if: inputs.mode == 'automated'
    runs-on: macos-latest
    steps:
      - name: Generate private key and CSR
        run: |
          openssl genrsa -out ios_distribution.key 2048
          openssl req -new -sha256 \
            -key ios_distribution.key \
            -out CertificateSigningRequest.certSigningRequest \
            -subj "/emailAddress=${{ inputs.email }}/CN=${{ inputs.common_name }}/C=US"
          echo "✅ Private key and CSR generated"

      - name: Create certificate via App Store Connect API
        env:
          ASC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Build JWT for App Store Connect API (ES256)
          python3 - <<'PYEOF'
          import base64, json, os, subprocess, time, urllib.request, urllib.error

          key_id    = os.environ["ASC_KEY_ID"]
          issuer_id = os.environ["ASC_ISSUER_ID"]
          api_key   = os.environ["ASC_API_KEY"]

          # Write API private key to temp file
          with open("/tmp/asc_key.p8", "w") as f:
              f.write(api_key if api_key.startswith("-----") else
                      f"-----BEGIN PRIVATE KEY-----\n{api_key}\n-----END PRIVATE KEY-----\n")

          # Build JWT header + payload
          now = int(time.time())
          header  = base64.urlsafe_b64encode(json.dumps({"alg":"ES256","kid":key_id,"typ":"JWT"}).encode()).rstrip(b"=").decode()
          payload = base64.urlsafe_b64encode(json.dumps({"iss":issuer_id,"iat":now,"exp":now+1200,"aud":"appstoreconnect-v1"}).encode()).rstrip(b"=").decode()
          signing_input = f"{header}.{payload}"

          # Sign with ES256 using openssl
          sig_der = subprocess.check_output(
              ["openssl", "dgst", "-sha256", "-sign", "/tmp/asc_key.p8"],
              input=signing_input.encode()
          )
          # Convert DER signature to raw R+S (64 bytes) for JWT
          r_len = sig_der[3]
          r = sig_der[4:4+r_len]
          s_len = sig_der[4+r_len+1]
          s = sig_der[4+r_len+2:4+r_len+2+s_len]
          r = r.lstrip(b"\x00").rjust(32, b"\x00")
          s = s.lstrip(b"\x00").rjust(32, b"\x00")
          sig = base64.urlsafe_b64encode(r + s).rstrip(b"=").decode()

          token = f"{signing_input}.{sig}"

          # Read CSR PEM content (strip headers, collapse to single base64 string)
          with open("CertificateSigningRequest.certSigningRequest", "r") as f:
              csr_lines = [l.strip() for l in f if not l.startswith("-----")]
          csr_content = "".join(csr_lines)

          # Call App Store Connect API
          body = json.dumps({
              "data": {
                  "type": "certificates",
                  "attributes": {
                      "certificateType": "DISTRIBUTION",
                      "csrContent": csr_content
                  }
              }
          }).encode()

          req = urllib.request.Request(
              "https://api.appstoreconnect.apple.com/v1/certificates",
              data=body,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST"
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              print(f"❌ API error {e.code}: {e.read().decode()}")
              raise SystemExit(1)

          cert_content = data["data"]["attributes"]["certificateContent"]
          with open("ios_distribution.cer.b64", "w") as f:
              f.write(cert_content)
          print("✅ Certificate created via App Store Connect API")
          PYEOF

      - name: Package .p12
        run: |
          # Decode the certificate Apple returned
          base64 --decode < ios_distribution.cer.b64 > ios_distribution.cer

          # Convert DER → PEM
          openssl x509 -inform DER -in ios_distribution.cer -out ios_distribution.pem

          # Generate random .p12 password
          P12_PASSWORD=$(openssl rand -hex 16)

          # Package .p12
          openssl pkcs12 -export \
            -inkey ios_distribution.key \
            -in ios_distribution.pem \
            -out ios_distribution.p12 \
            -password "pass:$P12_PASSWORD"

          P12_BASE64=$(base64 -i ios_distribution.p12)

          echo "✅ .p12 certificate packaged successfully!"
          echo ""
          echo "## 🔐 Add These GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Go to **Settings → Secrets → Actions** and add:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APPLE_CERTIFICATES_PASSWORD" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$P12_PASSWORD" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APPLE_CERTIFICATES_P12" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$P12_BASE64" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Once added, the **TestFlight Deploy** workflow will use these to sign builds." >> $GITHUB_STEP_SUMMARY

          # Clean up sensitive files
          rm -f ios_distribution.key ios_distribution.cer ios_distribution.pem ios_distribution.cer.b64

  # ── MANUAL PHASE 1 ───────────────────────────────────────────────
  generate-csr:
    name: Generate Certificate Signing Request
    if: inputs.mode == 'generate-csr'
    runs-on: macos-latest
    steps:
      - name: Generate private key and CSR
        run: |
          # Generate 2048-bit RSA private key
          openssl genrsa -out ios_distribution.key 2048

          # Generate CSR using SHA-256 (required by Apple)
          openssl req -new -sha256 \
            -key ios_distribution.key \
            -out CertificateSigningRequest.certSigningRequest \
            -subj "/emailAddress=${{ inputs.email }}/CN=${{ inputs.common_name }}/C=US"

          echo "✅ CSR generated successfully"
          echo ""
          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the **signing-csr** artifact below" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to [developer.apple.com](https://developer.apple.com/account/resources/certificates/add)" >> $GITHUB_STEP_SUMMARY
          echo "3. Select **Apple Distribution**" >> $GITHUB_STEP_SUMMARY
          echo "4. Upload \`CertificateSigningRequest.certSigningRequest\` from the artifact" >> $GITHUB_STEP_SUMMARY
          echo "5. Download the \`.cer\` file Apple gives you" >> $GITHUB_STEP_SUMMARY
          echo "6. Base64-encode it and add as GitHub Secret \`APPLE_CERTIFICATE_CER\`" >> $GITHUB_STEP_SUMMARY
          echo "7. Run this workflow again with mode **package-p12**" >> $GITHUB_STEP_SUMMARY

      - name: Cache private key for Phase 2
        run: |
          # Store private key as base64 in a file for the artifact
          # The key is needed in Phase 2 to create the .p12
          base64 -i ios_distribution.key -o private_key.b64

      - name: Upload CSR artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-csr
          path: |
            CertificateSigningRequest.certSigningRequest
            private_key.b64
          retention-days: 1

  # ── MANUAL PHASE 2 ───────────────────────────────────────────────
  package-p12:
    name: Package .p12 Distribution Certificate
    if: inputs.mode == 'package-p12'
    runs-on: macos-latest
    steps:
      - name: Download CSR artifact (contains private key)
        uses: actions/download-artifact@v4
        with:
          name: signing-csr
        continue-on-error: false

      - name: Check for required inputs
        env:
          APPLE_CERTIFICATE_CER: ${{ secrets.APPLE_CERTIFICATE_CER }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_CER" ]; then
            echo "❌ Missing APPLE_CERTIFICATE_CER secret."
            echo "Add the base64-encoded .cer file from Apple as a GitHub Secret."
            exit 1
          fi

          if [ ! -f private_key.b64 ]; then
            echo "❌ Missing private key from Phase 1."
            echo "The signing-csr artifact may have expired (1-day retention)."
            echo "Re-run Phase 1 (generate-csr) and complete both phases within 24 hours."
            exit 1
          fi

      - name: Create .p12 certificate
        env:
          APPLE_CERTIFICATE_CER: ${{ secrets.APPLE_CERTIFICATE_CER }}
        run: |
          # Decode the private key from Phase 1
          base64 -d -i private_key.b64 -o ios_distribution.key

          # Decode the .cer from Apple
          echo "$APPLE_CERTIFICATE_CER" | base64 --decode > ios_distribution.cer

          # Convert .cer (DER) to .pem
          openssl x509 -inform DER -in ios_distribution.cer -out ios_distribution.pem

          # Generate a random password for the .p12
          P12_PASSWORD=$(openssl rand -hex 16)

          # Package into .p12
          openssl pkcs12 -export \
            -inkey ios_distribution.key \
            -in ios_distribution.pem \
            -out ios_distribution.p12 \
            -password "pass:$P12_PASSWORD"

          # Base64-encode the .p12 for GitHub Secrets
          P12_BASE64=$(base64 -i ios_distribution.p12)

          echo "✅ .p12 certificate created successfully!"
          echo ""
          echo "## 🔐 Add These GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Go to **Settings → Secrets → Actions** and add:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APPLE_CERTIFICATES_PASSWORD" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$P12_PASSWORD" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APPLE_CERTIFICATES_P12" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$P12_BASE64" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Once added, the **TestFlight Deploy** workflow will use these to sign builds." >> $GITHUB_STEP_SUMMARY

          # Clean up sensitive files
          rm -f ios_distribution.key ios_distribution.cer ios_distribution.pem private_key.b64
