<!DOCTYPE html>
<html>
<head>
  <!--
    WreckerLogix — AI-Powered Tow Industry Operations
    If you're running this on an iPhone, tap Share → Add to Home Screen
    for the full app experience.
  -->
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WreckerLogix — AI-Powered Tow Industry Operations Platform">

  <!-- iOS / iPhone PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WreckerLogix">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Viewport for mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Theme color for browser UI -->
  <meta name="theme-color" content="#1565C0">

  <title>WreckerLogix</title>

  <!-- Splash screen styling while Flutter loads -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1565C0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading {
      text-align: center;
      color: white;
    }
    .loading h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .loading p {
      font-size: 14px;
      opacity: 0.8;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 24px auto;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <h1>🚛 WreckerLogix</h1>
    <p>AI-Powered Tow Industry Operations</p>
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
